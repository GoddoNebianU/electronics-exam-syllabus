<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-subject="shudian">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="电子技术基础（数字电子技术 + 模拟电子技术）考试大纲 · 离线备考工具" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%23475569'/%3E%3Ctext x='16' y='23' font-size='20' font-weight='800' fill='white' text-anchor='middle' font-family='system-ui,sans-serif'%3E%E7%94%B5%3C/text%3E%3C/svg%3E" />
  <title>电子技术基础考纲 · 备考工具</title>
  <!-- 极少量初始化：尽早应用主题，避免刷新闪烁 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ezt-theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var r = document.documentElement;
        r.setAttribute('data-theme', t);
        r.style.colorScheme = t;
      } catch (e) { /* noop */ }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
